<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Artist Profile | RaaG</title>

<link rel="stylesheet" href="profile.css">

</head>

<body>

<div class="navbar">

<div class="logo">RaaG</div>

<a href="dashboard.html" class="back-btn">⬅ Dashboard</a>

</div>


<div class="profile-container">

<h1>Create Your Artist Profile</h1>
<p class="subtitle">Show the world your musical talent</p>

<form id="profileForm" class="profile-form">

<div class="profile-pic">

<img id="preview" src="https://via.placeholder.com/120">

<input type="file" id="imageUpload">

</div>

<input type="text" id="username" placeholder="Artist Username" required>

<textarea id="bio" placeholder="Tell us about yourself and your music journey"></textarea>

<input type="text" id="skills" placeholder="Your Skills (Singer, Guitar, Tabla etc.)">

<input type="text" id="location" placeholder="City / Location">

<button type="submit" class="create-btn">Create Profile</button>

</form>

<p id="successMessage"></p>

</div>

<script src="profile.js"></script>

</body>

</html>
